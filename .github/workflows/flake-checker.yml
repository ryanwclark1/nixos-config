name: Flake ❄️ Checker ✅

on:
  push:
    branches:
      - main
  schedule:
    # l33t o'clock
    - cron: '37 13 * * *'
  workflow_dispatch:

jobs:
  flake-checker:
    name: Flake Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: DeterminateSystems/flake-checker-action@v10
      - name: QuickShell structure verify (CI deterministic)
        run: |
          nix shell nixpkgs#bash nixpkgs#python3 nixpkgs#ripgrep nixpkgs#coreutils nixpkgs#cliphist nixpkgs#wl-clipboard nixpkgs#nodejs -c \
            bash ./home/features/desktop/window-managers/shared/panel/quickshell/scripts/quickshell-structure-verify.sh --ci --quiet
      - name: QuickShell Vitest suite
        run: |
          cd home/features/desktop/window-managers/shared/panel/quickshell
          nix shell nixpkgs#nodejs -c sh -c 'npm ci && npm test'
      - name: QuickShell compositor guard checks
        run: |
          nix shell nixpkgs#bash nixpkgs#ripgrep nixpkgs#coreutils -c \
            bash ./home/features/desktop/window-managers/shared/panel/quickshell/scripts/compositor-verify.sh --ci
      - name: QuickShell plugin verification checks
        run: |
          qt5compat_qml="$(nix build --no-link --print-out-paths nixpkgs#qt6.qt5compat)/lib/qt-6/qml"
          qtmultimedia_qml="$(nix build --no-link --print-out-paths nixpkgs#qt6.qtmultimedia)/lib/qt-6/qml"
          qml_import_path="${qt5compat_qml}:${qtmultimedia_qml}"
          QML2_IMPORT_PATH="${qml_import_path}${QML2_IMPORT_PATH:+:${QML2_IMPORT_PATH}}" \
          QML_IMPORT_PATH="${qml_import_path}${QML_IMPORT_PATH:+:${QML_IMPORT_PATH}}" \
          nix shell nixpkgs#bash nixpkgs#jq nixpkgs#findutils nixpkgs#coreutils nixpkgs#ripgrep nixpkgs#nodejs nixpkgs#quickshell nixpkgs#qt6.qt5compat nixpkgs#qt6.qtmultimedia -c \
            bash ./home/features/desktop/window-managers/shared/panel/quickshell/scripts/plugin-verify.sh
      - name: QuickShell launcher smoke checks (CI mode)
        run: |
          nix shell nixpkgs#bash nixpkgs#ripgrep nixpkgs#coreutils nixpkgs#findutils nixpkgs#gawk nixpkgs#nodejs -c \
            bash ./home/features/desktop/window-managers/shared/panel/quickshell/scripts/check-launcher-smoke.sh --ci
