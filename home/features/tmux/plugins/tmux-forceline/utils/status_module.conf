# vim:set ft=tmux:
# Universal Status Module Renderer for tmux-forceline
# Base24-compatible module rendering system
#
# Classic powerline convention:
#   Left side:  [icon]▶[text]▶  — arrows AFTER content, pointing right (away)
#   Right side: ◁[icon]◁[text]  — arrows BEFORE content, pointing left (away)

# Validate MODULE_NAME is set
%if "#{==:#{MODULE_NAME},}"
  display-message "Error: MODULE_NAME not set for status module"
%endif

# Connection style for seamless module chaining
set -gqF @_connect_style \
  "#{?#{==:#{@forceline_status_connect_separator},yes},,#[bg=default]}"

# Default fallback configurations using Base24 colors
set -ogqF "@forceline_status_${MODULE_NAME}_icon_fg" "#{@base00}"  # dark on light icon
set -ogqF "@forceline_status_${MODULE_NAME}_text_fg" "#{@fg}"      # default text color

# Icon background defaults to module theme color
%if "#{==:#{@forceline_status_${MODULE_NAME}_icon_bg},}"
  set -gqF "@forceline_status_${MODULE_NAME}_icon_bg" "#{@forceline_${MODULE_NAME}_color}"
%endif
# Double-expand to resolve nested references (e.g. #{@base0A}) to hex
set -gqF "@forceline_status_${MODULE_NAME}_icon_bg" "#{E:@forceline_status_${MODULE_NAME}_icon_bg}"

# Text background with intelligent fallback
%if "#{==:#{@forceline_status_${MODULE_NAME}_text_bg},}"
  set -gqF @_module_text_bg "#{@surface_0}"  # default surface
%else
  set -gqF @_module_text_bg "#{@forceline_status_${MODULE_NAME}_text_bg}"
%endif
# Double-expand to resolve nested references to hex
set -gqF @_module_text_bg "#{E:@_module_text_bg}"

# ─── LEFT SIDE: [icon]▶[text]▶ ───
%if "#{==:$MODULE_SIDE,left}"

  # Icon section (starts directly, no entry arrow)
  set -gF "@forceline_status_${MODULE_NAME}" \
    "#[fg=#{@forceline_status_${MODULE_NAME}_icon_fg},bg=#{@forceline_status_${MODULE_NAME}_icon_bg}]#{@forceline_${MODULE_NAME}_icon}"

  # ▶ arrow after icon — icon_bg extends right into text_bg
  set -agF "@forceline_status_${MODULE_NAME}" \
    "#[fg=#{@forceline_status_${MODULE_NAME}_icon_bg},bg=#{@_module_text_bg}]#{@forceline_status_left_separator}"

  # Text section
  set -agF "@forceline_status_${MODULE_NAME}" \
    "#[fg=#{@forceline_status_${MODULE_NAME}_text_fg},bg=#{@_module_text_bg}]"
  set -ag "@forceline_status_${MODULE_NAME}" "#{E:@forceline_${MODULE_NAME}_text}"

  # ▶ arrow after text — text_bg extends right (connect for chaining)
  set -agF "@forceline_status_${MODULE_NAME}" \
    "#[fg=#{@_module_text_bg}]#{@_connect_style}#{@forceline_status_left_separator}"

# ─── RIGHT SIDE: ◁[icon]◁[text] ───
%else

  # ◁ arrow before icon — icon_bg extends left (connect for chaining)
  set -gF "@forceline_status_${MODULE_NAME}" \
    "#[fg=#{@forceline_status_${MODULE_NAME}_icon_bg}]#{@_connect_style}#{@forceline_status_right_separator}"

  # Icon section
  set -agF "@forceline_status_${MODULE_NAME}" \
    "#[fg=#{@forceline_status_${MODULE_NAME}_icon_fg},bg=#{@forceline_status_${MODULE_NAME}_icon_bg}]#{@forceline_${MODULE_NAME}_icon}"

  # Separator between icon and text — style-dependent
  %if "#{==:#{@forceline_separator_icon_convex},yes}"
    # Convex: icon gets rounded right edge (pill/bubble style)
    set -agF "@forceline_status_${MODULE_NAME}" \
      "#[fg=#{@forceline_status_${MODULE_NAME}_icon_bg},bg=#{@_module_text_bg}]#{@forceline_status_left_separator}"
  %else
    # Arrow: text_bg extends left into icon_bg (standard powerline)
    set -agF "@forceline_status_${MODULE_NAME}" \
      "#[fg=#{@_module_text_bg},bg=#{@forceline_status_${MODULE_NAME}_icon_bg}]#{@forceline_status_right_separator}"
  %endif

  # Text section (ends directly, no exit arrow)
  set -agF "@forceline_status_${MODULE_NAME}" \
    "#[fg=#{@forceline_status_${MODULE_NAME}_text_fg},bg=#{@_module_text_bg}]"
  set -ag "@forceline_status_${MODULE_NAME}" "#{E:@forceline_${MODULE_NAME}_text}"

%endif

# Cleanup temporary variables
set -ug @_connect_style
set -ug @_module_text_bg
