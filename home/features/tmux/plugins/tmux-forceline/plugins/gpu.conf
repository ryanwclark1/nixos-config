# vim:set ft=tmux:
# GPU Plugin for tmux-forceline
# Graphics card utilization and temperature monitoring with multi-vendor support

%hidden MODULE_NAME="gpu"
%hidden MODULE_SIDE="right"

# Plugin metadata
set -g @_plugin_gpu_version "3.0.0"
set -g @_plugin_gpu_description "GPU utilization and temperature monitoring"

# Base24 color configuration
set -ogq @forceline_gpu_low_fg "#{@fg}"
set -ogq @forceline_gpu_medium_fg "#{@fg}"
set -ogq @forceline_gpu_high_fg "#{@base00}"
set -ogq @forceline_gpu_critical_fg "#{@base00}"

set -ogq @forceline_gpu_low_bg "#{@surface_0}"
set -ogq @forceline_gpu_medium_bg "#{@base0E}"  # magenta
set -ogq @forceline_gpu_high_bg "#{@base09}"    # orange
set -ogq @forceline_gpu_critical_bg "#{@base08}" # red

# Dynamic color selection based on GPU usage
set -ogq @forceline_gpu_fg_color "#{@forceline_gpu_low_fg}"
set -ogq @forceline_gpu_bg_color "#{@forceline_gpu_low_bg}"

# Plugin configuration
set -ogq "@forceline_${MODULE_NAME}_icon" "󰾲 "
set -ogq "@forceline_${MODULE_NAME}_color" "#{@base0E}"  # magenta theme
set -ogq "@forceline_${MODULE_NAME}_text_fg" "#{@forceline_gpu_fg_color}"
set -ogq "@forceline_${MODULE_NAME}_text_bg" "#{@forceline_gpu_bg_color}"

# GPU display format
set -ogq "@forceline_${MODULE_NAME}_text" " #(#{@forceline_dir}/modules/gpu/main.sh percentage)"

# Load the universal status module renderer
source -F "#{@forceline_dir}/utils/status_module.conf"

# Register plugin capabilities
set -ag @_plugin_capabilities "gpu_monitoring,temperature_monitoring,multi_vendor_support,dynamic_colors"
