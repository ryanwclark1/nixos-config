# vim:set ft=tmux:
# Disk Usage Plugin for tmux-forceline
# Enhanced disk monitoring with configurable paths and threshold-based colors

%hidden MODULE_NAME="disk_usage"
%hidden MODULE_SIDE="right"

# Plugin metadata
set -g @_plugin_disk_usage_version "3.0.0"
set -g @_plugin_disk_usage_description "Disk usage monitoring with configurable paths and thresholds"

# Disk usage configuration
set -ogq @forceline_disk_usage_path "/"              # Path to monitor (default: root)
set -ogq @forceline_disk_usage_format "percentage"   # percentage, used, available, size, compact, full
set -ogq @forceline_disk_usage_show_path "no"        # Show path in output
set -ogq @forceline_disk_usage_warning_threshold "80"    # Warning threshold percentage
set -ogq @forceline_disk_usage_critical_threshold "90"   # Critical threshold percentage

# Base24 color configuration for disk usage states
set -ogq @forceline_disk_usage_normal_fg "#{@fg}"
set -ogq @forceline_disk_usage_warning_fg "#{@base00}"
set -ogq @forceline_disk_usage_critical_fg "#{@base00}"

set -ogq @forceline_disk_usage_normal_bg "#{@surface_0}"
set -ogq @forceline_disk_usage_warning_bg "#{@warning}"    # orange
set -ogq @forceline_disk_usage_critical_bg "#{@error}"     # red

# Dynamic color selection simplified for now
set -ogq @forceline_disk_usage_fg_color "#{@forceline_disk_usage_normal_fg}"
set -ogq @forceline_disk_usage_bg_color "#{@forceline_disk_usage_normal_bg}"

# Plugin configuration using direct df command
set -ogq "@forceline_${MODULE_NAME}_icon" "󰋊 "
set -ogq "@forceline_${MODULE_NAME}_color" "#{@base09}"  # orange theme
set -ogq "@forceline_${MODULE_NAME}_text_fg" "#{@forceline_disk_usage_fg_color}"
set -ogq "@forceline_${MODULE_NAME}_text_bg" "#{@forceline_disk_usage_bg_color}"

# Disk usage display format
set -ogq "@forceline_${MODULE_NAME}_text" " #(#{@forceline_dir}/modules/disk_usage/main.sh data)"

# Load the universal status module renderer
source -F "#{@forceline_dir}/utils/status_module.conf"

# Register plugin capabilities
set -ag @_plugin_capabilities "disk_monitoring,configurable_paths,threshold_colors,multiple_formats"