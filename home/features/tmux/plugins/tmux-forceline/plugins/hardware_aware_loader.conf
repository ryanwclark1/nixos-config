# vim:set ft=tmux:
# Hardware-Aware Plugin Loader (Generated)
# This file is auto-generated based on hardware detection

# Plugin system configuration
set -ogq @forceline_plugin_auto_load "yes"
set -ogq @forceline_plugin_path "#{d:current_file}"
set -ogq @forceline_user_plugin_path "~/.config/tmux/forceline/plugins"

# Plugin loading state
set -g @_plugins_loaded ""
set -g @_plugins_failed ""
set -g @_hardware_detected "yes"

# Hardware detection results (static)
set -g @_is_laptop "false"
set -g @_os_type "nixos"
set -g @_capabilities "network,lan_ip,wan_ip,vcs,cpu,memory,gpu,graphics_memory,load,uptime,hostname,datetime,disk_usage"

# Core plugins (always loaded)
set -g @_core_plugins "hostname,datetime,cpu,memory,gpu,graphics_memory,load,uptime"

# Load essential plugins
source -qF "#{d:current_file}/hostname.conf"
source -qF "#{d:current_file}/datetime.conf"
source -qF "#{d:current_file}/cpu.conf"
source -qF "#{d:current_file}/memory.conf"
source -qF "#{d:current_file}/gpu.conf"
source -qF "#{d:current_file}/graphics_memory.conf"
source -qF "#{d:current_file}/load.conf"
source -qF "#{d:current_file}/uptime.conf"

# Battery plugin skipped (desktop detected)
set -g @_battery_skipped "yes"

# Load development plugins
source -qF "#{d:current_file}/vcs.conf"
source -qF "#{d:current_file}/directory.conf"

# Load system plugins
source -qF "#{d:current_file}/disk_usage.conf"
source -qF "#{d:current_file}/session.conf"

# Load network plugins
source -qF "#{d:current_file}/lan_ip.conf"
source -qF "#{d:current_file}/wan_ip.conf"

# Build plugin list
set -g @_all_plugins "#{@_core_plugins},vcs,directory,disk_usage,session,lan_ip,wan_ip"

# Display loading summary
%if "#{==:#{@forceline_debug_modules},yes}"
  display-message "Hardware-aware loading: laptop=#{@_is_laptop}, plugins=#{@_all_plugins}"
%endif

# Register loaded plugins for status bar configuration
set -g @forceline_active_plugins "#{@_all_plugins}"
