# vim:set ft=tmux:
# WAN IP Plugin for tmux-forceline
# Enhanced WAN IP detection with intelligent caching and multiple providers

%hidden MODULE_NAME="wan_ip"
%hidden MODULE_SIDE="right"

# Plugin metadata
set -g @_plugin_wan_ip_version "3.0.0"
set -g @_plugin_wan_ip_description "WAN IP detection with intelligent caching and multiple providers"

# WAN IP configuration
set -ogq @forceline_wan_ip_cache_ttl "900"           # Cache TTL in seconds (15 minutes)
set -ogq @forceline_wan_ip_timeout "3"              # Request timeout in seconds
set -ogq @forceline_wan_ip_format "ip"              # Output format: ip, geo, compact, full
set -ogq @forceline_wan_ip_show_status "no"         # Show cache status (FRESH/CACHED/STALE)

# Base24 color configuration for WAN IP states
set -ogq @forceline_wan_ip_online_fg "#{@fg}"
set -ogq @forceline_wan_ip_cached_fg "#{@fg}"
set -ogq @forceline_wan_ip_stale_fg "#{@base00}"
set -ogq @forceline_wan_ip_offline_fg "#{@base00}"

set -ogq @forceline_wan_ip_online_bg "#{@success}"     # green - fresh IP
set -ogq @forceline_wan_ip_cached_bg "#{@surface_0}"   # normal - cached IP
set -ogq @forceline_wan_ip_stale_bg "#{@warning}"      # orange - stale cache
set -ogq @forceline_wan_ip_offline_bg "#{@error}"      # red - failed to fetch

# Dynamic color selection
set -ogq @forceline_wan_ip_fg_color "#{@forceline_wan_ip_online_fg}"
set -ogq @forceline_wan_ip_bg_color "#{@forceline_wan_ip_cached_bg}"

# Plugin configuration
set -ogq "@forceline_${MODULE_NAME}_icon" "󰖂 "
set -ogq "@forceline_${MODULE_NAME}_color" "#{@base0C}"  # cyan theme
set -ogq "@forceline_${MODULE_NAME}_text_fg" "#{@forceline_wan_ip_fg_color}"
set -ogq "@forceline_${MODULE_NAME}_text_bg" "#{@forceline_wan_ip_bg_color}"

# WAN IP display format
set -ogq "@forceline_${MODULE_NAME}_text" " #(#{@forceline_dir}/modules/wan_ip/main.sh enhanced)"

# Load the universal status module renderer
source -F "#{@forceline_dir}/utils/status_module.conf"

# Register plugin capabilities
set -ag @_plugin_capabilities "wan_ip_detection,intelligent_caching,multiple_providers,status_indication"
