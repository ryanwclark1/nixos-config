# vim:set ft=tmux:
# Session Plugin for tmux-forceline
# Displays current tmux session information with dynamic styling

%hidden MODULE_NAME="session"
%hidden MODULE_SIDE="left"

# Plugin metadata
set -g @_plugin_session_version "2.0.0"
set -g @_plugin_session_description "tmux session information display"

# Session display configuration
set -ogq @forceline_session_show_name "yes"
set -ogq @forceline_session_show_index "no"
set -ogq @forceline_session_show_client_count "no"
set -ogq @forceline_session_max_name_length "15"

# Base24 color configuration
set -ogq @forceline_session_normal_fg "#{@fg}"
set -ogq @forceline_session_active_fg "#{@base00}"
set -ogq @forceline_session_multiple_fg "#{@base00}"

set -ogq @forceline_session_normal_bg "#{@surface_0}"
set -ogq @forceline_session_active_bg "#{@primary}"    # blue - active session
set -ogq @forceline_session_multiple_bg "#{@accent}"  # brown - multiple sessions
set -ogq @forceline_session_prefix_bg "#{@secondary}"  # prefix active color
set -ogq @forceline_session_prefix_fg "#{@base00}"

# Plugin configuration
set -ogq "@forceline_${MODULE_NAME}_icon" "󱂬 "
set -ogq "@forceline_${MODULE_NAME}_color" "#{@primary}"  # blue theme (static for module renderer)

# Session display format
%if "#{==:#{@forceline_session_show_client_count},yes}"
  %if "#{==:#{@forceline_session_show_index},yes}"
    set -ogq "@forceline_${MODULE_NAME}_text" " #S[#I] (#{session_windows}w)"
  %else
    set -ogq "@forceline_${MODULE_NAME}_text" " #S (#{session_windows}w)"
  %endif
%elif "#{==:#{@forceline_session_show_index},yes}"
  set -ogq "@forceline_${MODULE_NAME}_text" " #S[#I]"
%else
  set -ogq "@forceline_${MODULE_NAME}_text" " #S"
%endif

# Build session format directly (bypasses status_module.conf to support
# deferred #{?client_prefix,...} conditionals at render time).
#
# Uses mix of -agF (hex resolution) and -ag (literal, for #{E:...} refs).
# Left-side structure: [icon]▶[text]▶

# Connection style for seamless module chaining
set -gqF @_connect_style \
  "#{?#{==:#{@forceline_status_connect_separator},yes},,#[bg=default]}"

# Pre-resolve hex colors (double-expand to resolve nested refs to hex)
set -gqF @_s_icon_fg "#{@base00}"
set -gqF @_s_prefix_bg "#{E:@forceline_session_prefix_bg}"
set -gqF @_s_normal_bg "#{@primary}"
set -gqF @_s_normal_bg "#{E:@_s_normal_bg}"
set -gqF @_s_text_bg "#{@surface_0}"
set -gqF @_s_text_bg "#{E:@_s_text_bg}"
set -gqF @_s_text_fg "#{@fg}"

# Build deferred conditionals: #{?client_prefix,PREFIX_HEX,NORMAL_HEX}
# These are stored as literal format strings, evaluated at render time via #{E:...}
set -g  @_s_icon_bg_fmt "#{?client_prefix,"
set -agF @_s_icon_bg_fmt "#{@_s_prefix_bg}"
set -ag  @_s_icon_bg_fmt ","
set -agF @_s_icon_bg_fmt "#{@_s_normal_bg}"
set -ag  @_s_icon_bg_fmt "}"

# [Icon section] — no entry arrow on left side
set -gF  @forceline_status_session "#[fg=#{@_s_icon_fg},bg="
set -ag  @forceline_status_session "#{E:@_s_icon_bg_fmt}"
set -ag  @forceline_status_session "]"
set -ag  @forceline_status_session "#{E:@forceline_session_icon}"

# [▶ after icon] — icon_bg transitions into text_bg
set -ag  @forceline_status_session "#[fg="
set -ag  @forceline_status_session "#{E:@_s_icon_bg_fmt}"
set -agF @forceline_status_session ",bg=#{@_s_text_bg}]#{@forceline_status_left_separator}"

# [Text section]
set -agF @forceline_status_session "#[fg=#{@_s_text_fg},bg=#{@_s_text_bg}]"
set -ag  @forceline_status_session "#{E:@forceline_session_text}"

# [▶ after text] — text_bg extends right (connect for chaining)
set -agF @forceline_status_session "#[fg=#{@_s_text_bg}]#{@_connect_style}#{@forceline_status_left_separator}"

# Cleanup
set -ug @_connect_style
set -ug @_s_icon_fg
set -ug @_s_prefix_bg
set -ug @_s_normal_bg
set -ug @_s_text_bg
set -ug @_s_text_fg

# Register plugin capabilities
set -ag @_plugin_capabilities "session_monitoring,dynamic_colors,client_counting,prefix_indicator"