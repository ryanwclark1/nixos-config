# vim:set ft=tmux:
# CPU Plugin for tmux-forceline
# Enhanced CPU monitoring with temperature and load tracking

%hidden MODULE_NAME="cpu"
%hidden MODULE_SIDE="right"

# Plugin metadata
set -g @_plugin_cpu_version "2.0.0"
set -g @_plugin_cpu_description "Enhanced CPU monitoring with temperature"

# Base24 color configuration
set -ogq @forceline_cpu_low_fg "#{@fg}"
set -ogq @forceline_cpu_medium_fg "#{@fg}"
set -ogq @forceline_cpu_high_fg "#{@base00}"
set -ogq @forceline_cpu_critical_fg "#{@base00}"

set -ogq @forceline_cpu_low_bg "#{@surface_0}"
set -ogq @forceline_cpu_medium_bg "#{@base0A}"  # yellow
set -ogq @forceline_cpu_high_bg "#{@base09}"    # orange
set -ogq @forceline_cpu_critical_bg "#{@base08}" # red

# Dynamic color selection based on CPU usage
set -ogq @forceline_cpu_fg_color "#{@forceline_cpu_low_fg}"
set -ogq @forceline_cpu_bg_color "#{@forceline_cpu_low_bg}"

# Plugin configuration
set -ogq "@forceline_${MODULE_NAME}_icon" "󰍛 "
set -ogq "@forceline_${MODULE_NAME}_color" "#{@base0A}"  # yellow theme
set -ogq "@forceline_${MODULE_NAME}_text_fg" "#{@forceline_cpu_fg_color}"
set -ogq "@forceline_${MODULE_NAME}_text_bg" "#{@forceline_cpu_bg_color}"

# CPU display format
set -ogq "@forceline_${MODULE_NAME}_text" " #(#{@forceline_dir}/modules/cpu/main.sh percentage)"

# Load the universal status module renderer using centralized path
source -F "#{@forceline_dir}/utils/status_module.conf"

# Register plugin capabilities
set -ag @_plugin_capabilities "cpu_monitoring,temperature_monitoring,dynamic_colors"