# vim:set ft=tmux:
# Memory Plugin for tmux-forceline
# RAM monitoring with usage-based theming

%hidden MODULE_NAME="memory"
%hidden MODULE_SIDE="right"

# Plugin metadata
set -g @_plugin_memory_version "3.0.0"
set -g @_plugin_memory_description "RAM usage monitoring"

# Base24 color configuration
set -ogq @forceline_memory_low_fg "#{@fg}"
set -ogq @forceline_memory_medium_fg "#{@fg}"
set -ogq @forceline_memory_high_fg "#{@base00}"
set -ogq @forceline_memory_critical_fg "#{@base00}"

set -ogq @forceline_memory_low_bg "#{@surface_0}"
set -ogq @forceline_memory_medium_bg "#{@base0C}"  # cyan
set -ogq @forceline_memory_high_bg "#{@base09}"    # orange
set -ogq @forceline_memory_critical_bg "#{@base08}" # red

# Dynamic color selection
set -ogq @forceline_memory_fg_color "#{@forceline_memory_low_fg}"
set -ogq @forceline_memory_bg_color "#{@forceline_memory_low_bg}"

# Plugin configuration
set -ogq "@forceline_${MODULE_NAME}_icon" "󰘚 "
set -ogq "@forceline_${MODULE_NAME}_color" "#{@base0C}"  # cyan theme
set -ogq "@forceline_${MODULE_NAME}_text_fg" "#{@forceline_memory_fg_color}"
set -ogq "@forceline_${MODULE_NAME}_text_bg" "#{@forceline_memory_bg_color}"

# Memory display format
set -ogq "@forceline_${MODULE_NAME}_text" " #(#{@forceline_dir}/modules/memory/main.sh percentage)"

# Load the universal status module renderer
source -F "#{@forceline_dir}/utils/status_module.conf"

# Register plugin capabilities
set -ag @_plugin_capabilities "memory_monitoring,dynamic_colors"
