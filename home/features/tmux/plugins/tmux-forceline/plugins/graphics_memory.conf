# vim:set ft=tmux:
# Graphics Memory Plugin for tmux-forceline
# VRAM and GPU memory monitoring with multi-vendor support

%hidden MODULE_NAME="graphics_memory"
%hidden MODULE_SIDE="right"

# Plugin metadata
set -g @_plugin_graphics_memory_version "3.0.0"
set -g @_plugin_graphics_memory_description "GPU VRAM and graphics memory monitoring"

# Base24 color configuration
set -ogq @forceline_graphics_memory_low_fg "#{@fg}"
set -ogq @forceline_graphics_memory_medium_fg "#{@fg}"
set -ogq @forceline_graphics_memory_high_fg "#{@base00}"
set -ogq @forceline_graphics_memory_critical_fg "#{@base00}"

set -ogq @forceline_graphics_memory_low_bg "#{@surface_0}"
set -ogq @forceline_graphics_memory_medium_bg "#{@base0D}"  # blue
set -ogq @forceline_graphics_memory_high_bg "#{@base09}"    # orange
set -ogq @forceline_graphics_memory_critical_bg "#{@base08}" # red

# Dynamic color selection based on graphics memory usage
set -ogq @forceline_graphics_memory_fg_color "#{@forceline_graphics_memory_low_fg}"
set -ogq @forceline_graphics_memory_bg_color "#{@forceline_graphics_memory_low_bg}"

# Plugin configuration
set -ogq "@forceline_${MODULE_NAME}_icon" "🎮 "
set -ogq "@forceline_${MODULE_NAME}_color" "#{@base0D}"  # blue theme
set -ogq "@forceline_${MODULE_NAME}_text_fg" "#{@forceline_graphics_memory_fg_color}"
set -ogq "@forceline_${MODULE_NAME}_text_bg" "#{@forceline_graphics_memory_bg_color}"

# Graphics memory display format
set -ogq "@forceline_${MODULE_NAME}_text" " #(#{@forceline_dir}/modules/graphics_memory/main.sh percentage)"

# Load the universal status module renderer
source -F "#{@forceline_dir}/utils/status_module.conf"

# Register plugin capabilities
set -ag @_plugin_capabilities "graphics_memory_monitoring,vram_monitoring,multi_vendor_support,dynamic_colors"
