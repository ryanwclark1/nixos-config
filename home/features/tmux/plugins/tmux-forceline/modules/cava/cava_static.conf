# tmux-forceline Cava Module Configuration

# Enable cava module
set -ogq "@forceline_cava_enabled" "on"

# Cava display settings
set -ogq "@forceline_cava_bars" "16"
set -ogq "@forceline_cava_symbols" "▁▂▃▄▅▆▇█"
set -ogq "@forceline_cava_color" "none"
set -ogq "@forceline_cava_palette" "24,27,33,40,76,178,208,196"
set -ogq "@forceline_cava_ttl" "1"

# Fallback display when cava is not available
set -ogq "@forceline_cava_fallback" "♪♫♪♫♪♫♪♫"

# Theme integration
set -ogq "@forceline_cava_fg_color" "#{@fg}"
set -ogq "@forceline_cava_bg_color" "#{@bg}"
set -ogq "@forceline_cava_accent_color" "#{@accent}"

# Display formats (use #{@forceline_dir} for portable paths)
set -ogq "@forceline_cava_display" "#(#{@forceline_dir}/modules/cava/cava.sh)"
set -ogq "@forceline_cava_display_accent" "#[fg=#{@forceline_cava_accent_color}]♪ #[fg=#{@forceline_cava_fg_color}]#(#{@forceline_dir}/modules/cava/cava.sh)#[default]"

# Status bar integration examples:
# set -g status-right "#{@forceline_cava_display} #{@datetime_display}"
# set -g status-left "#{@session_display} #{@forceline_cava_display}"
