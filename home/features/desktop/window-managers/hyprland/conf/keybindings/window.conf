# -----------------------------------------------------
# Window Management & Navigation
# -----------------------------------------------------
# Window operations, focus movement, window movement, and resizing
# -----------------------------------------------------

# Window Management
bind = $mainMod, Q, killactive                                    # Close active window
bind = ALT, F4, killactive                                       # Close active window (alternative)
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill  # Force kill active window
bind = $mainMod SHIFT, E, exit                                   # Exit Hyprland
bind = $mainMod SHIFT, SPACE, togglefloating                     # Toggle floating mode
bind = $mainMod, F, fullscreen, 1                                # Fullscreen (all monitors)
bind = $mainMod SHIFT, F, fullscreen, 0                          # Windowed mode
bind = $mainMod, M, fullscreen, 0                                # Windowed mode (alternative)
# bind = $mainMod, R, swapsplit  # Disabled: dispatcher not available in Hyprland 0.54.0
bind = $mainMod, G, togglegroup                                  # Toggle window group
bind = $mainMod, T, lockactivegroup, toggle                      # Lock/unlock active group
bind = $mainMod, I, pseudo                                       # Toggle pseudo-tiling
# bind = $mainMod, K, swapsplit  # Moved to allow SUPER+K for keybindings-menu

# Window sizing
bind = $mainMod, minus, resizeactive, -50 0             # Make window narrower
bind = $mainMod, equal, resizeactive, 50 0              # Make window wider
bind = $mainMod SHIFT, minus, resizeactive, -100 0      # Make window narrower (larger step)
bind = $mainMod SHIFT, equal, resizeactive, 100 0       # Make window wider (larger step)

# Window utilities
bind = $mainMod, O, exec, window-pop                    # Pop window out (float & pin)
bind = CTRL ALT, DELETE, exec, close-all-windows        # Close all windows

# -----------------------------------------------------
# Navigation & Focus
# -----------------------------------------------------

# Window Switcher / Overview
bind = $mainMod, Tab, exec, quickshell ipc call Overview toggle  # Quickshell window overview
bind = ALT, Tab, exec, quickshell ipc call AltTab toggle         # Alt-Tab MRU window switcher

# Application switching
bind = $mainMod, left, cyclenext                                 # Next window
bind = $mainMod, right, cyclenext, prev                          # Previous window

# Move window to previous/next workspace
bind = $mainMod SHIFT, left, movetoworkspace, e-1                # Move window to previous workspace
bind = $mainMod SHIFT, right, movetoworkspace, e+1                # Move window to next workspace

# Focus movement (vim keys + arrow keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
# bind = $mainMod, K, movefocus, u  # Disabled: SUPER+K now shows keybindings-menu (use SUPER+up instead)
bind = $mainMod, J, movefocus, d
bind = $mainMod, up, movefocus, up
bind = $mainMod, down, movefocus, down

# Window movement (vim keys + arrow keys)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, up, movewindow, up
bind = $mainMod SHIFT, down, movewindow, down

# Window resizing (vim keys + arrow keys)
bind = $mainMod CTRL, H, resizeactive, -20 0
bind = $mainMod CTRL, L, resizeactive, 20 0
bind = $mainMod CTRL, K, resizeactive, 0 -20
bind = $mainMod CTRL, J, resizeactive, 0 20
bind = $mainMod CTRL, left, resizeactive, -20 0
bind = $mainMod CTRL, right, resizeactive, 20 0
bind = $mainMod CTRL, up, resizeactive, 0 -20
bind = $mainMod CTRL, down, resizeactive, 0 20

