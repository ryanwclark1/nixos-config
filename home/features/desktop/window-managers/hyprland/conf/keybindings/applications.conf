# -----------------------------------------------------
# Application Launchers & Menus
# -----------------------------------------------------
# Application shortcuts and rofi menu bindings
# -----------------------------------------------------

# Application shortcuts
bind = $mainMod, Return, exec, ghostty                           # Terminal
bind = $mainMod, E, exec, code                                 # Code editor
bind = $mainMod, B, exec, google-chrome                        # Web browser
bind = $mainMod, N, exec, nautilus                             # File manager
bind = $mainMod ALT, SPACE, exec, nautilus                     # File manager (alternative)

# Utility applications
bind = $mainMod CTRL, E, exec, qs-rofi -show emoji             # Emoji picker
bind = $mainMod CTRL, C, exec, qs-rofi -show calc              # Calculator
bind = $mainMod CTRL, V, exec, qs-rofi -show clip              # Clipboard manager

# Rofi Menus (conditional - will work if rofi is available)
bind = $mainMod, SPACE, exec, qs-rofi -show drun               # Primary application launcher
bind = $mainMod, X, exec, rofi -show drun                      # Application launcher (rofi)
bind = $mainMod, Z, exec, qs-rofi -show drun                   # Application launcher (qs-rofi)
bind = $mainMod, R, exec, qs-rofi -show run                    # Run command launcher
bind = $mainMod SHIFT, W, exec, qs-rofi -show web              # Web search launcher
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/style/cliphist.rasi | cliphist decode | wl-copy  # Clipboard history

# Voice-to-text (voxtype push-to-talk)
bind = $mainMod, V, exec, voxtype record toggle                    # Voice-to-text toggle

# Function Keys & Keybinding Help
# Note: Both F1 and K show keybindings menu for accessibility (F1 standard, K quick access)
bind = $mainMod, F1, exec, qs-rofi -show keybinds              # Show keybindings menu (standard)
bind = $mainMod, K, exec, qs-rofi -show keybinds               # Show keybindings menu (quick access)
