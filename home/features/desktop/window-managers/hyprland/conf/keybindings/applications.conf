# -----------------------------------------------------
# Application Launchers & Menus
# -----------------------------------------------------
# Application shortcuts and rofi menu bindings
# -----------------------------------------------------

# Application shortcuts
bind = $mainMod, Return, exec, kitty
bind = $mainMod, E, exec, code
bind = $mainMod, B, exec, google-chrome
bind = $mainMod, N, exec, nautilus
bind = $mainMod ALT, SPACE, exec, nautilus

# Utility applications
bind = $mainMod CTRL, E, exec, qs-rofi -show emoji
bind = $mainMod CTRL, C, exec, qs-rofi -show calc
bind = $mainMod, V, exec, qs-rofi -show clip

# Rofi Menus (conditional - will work if rofi is available)
bind = $mainMod, SPACE, exec, qs-rofi -show drun
bind = $mainMod, X, exec, qs-rofi -show drun
bind = $mainMod, Z, exec, qs-rofi -show drun
bind = $mainMod, R, exec, qs-rofi -show run
bind = $mainMod SHIFT, W, exec, qs-rofi -show web
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/style/cliphist.rasi | cliphist decode | wl-copy

# Function Keys & Keybinding Help
bind = $mainMod, F1, exec, qs-rofi -show keybinds              # Show keybindings menu
bind = $mainMod, K, exec, qs-rofi -show keybinds               # Show keybindings menu (Omarchy)
