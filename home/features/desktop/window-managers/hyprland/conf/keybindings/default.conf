# -----------------------------------------------------
# Default Hyprland Keybindings - REFERENCE/BACKUP FILE
# -----------------------------------------------------
#
# ⚠️  IMPORTANT: This file is NOT actively loaded by the Hyprland configuration.
#     The active keybindings are loaded via keybinding.conf from modular files:
#     - mouse.conf         - Mouse bindings
#     - window.conf        - Window management, navigation, focus, resizing
#     - workspace.conf     - Workspace switching and management, VM passthrough
#     - applications.conf  - Application launchers and rofi menus
#     - media.conf         - Media keys, volume, brightness, hardware keys
#     - system.conf        - System controls, power, screenshots, notifications
#
# This file is kept as a reference/backup of the consolidated keybindings.
# All keybindings have been migrated to the modular system for better organization.
#
# To use this file instead of the modular system, modify keybinding.conf to:
#   source = ~/.config/hypr/conf/keybindings/default.conf
#   (and comment out the individual file sources)
#
# Variables for cleaner syntax (using global variables from variables.conf)
# Note: Global path variables are defined in variables.conf:
# $HYPR_SCRIPTS, $SYSTEM_SCRIPTS, $WAYLAND_SCRIPTS, $ROFI_SCRIPTS
# -----------------------------------------------------

# This file intentionally left minimal as a reference.
# See the modular keybinding files listed above for the actual keybindings.
