# -----------------------------------------------------
# Media & Hardware Keys
# -----------------------------------------------------
# Media playback, volume, brightness, and hardware key bindings
# -----------------------------------------------------

# Audio playback control
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioStop, exec, playerctl stop
bind = SHIFT, XF86AudioNext, exec, playerctld shift
bind = SHIFT, XF86AudioPrev, exec, playerctld unshift
bind = SHIFT, XF86AudioPlay, exec, systemctl --user restart playerctld

# Volume control with explicit OSD trigger
bind = , XF86AudioRaiseVolume, exec, $HYPR_SCRIPTS/hypr/volume-osd.sh up
bind = , XF86AudioLowerVolume, exec, $HYPR_SCRIPTS/hypr/volume-osd.sh down
bind = , XF86AudioMute, exec, $HYPR_SCRIPTS/hypr/volume-osd.sh mute
bind = SHIFT, XF86AudioRaiseVolume, exec, $HYPR_SCRIPTS/hypr/mic-osd.sh up
bind = SHIFT, XF86AudioLowerVolume, exec, $HYPR_SCRIPTS/hypr/mic-osd.sh down
bind = SHIFT, XF86AudioMute, exec, $HYPR_SCRIPTS/hypr/mic-osd.sh mute
bind = , XF86AudioMicMute, exec, $HYPR_SCRIPTS/hypr/mic-osd.sh mute

# Brightness control
bind = , XF86MonBrightnessUp, exec, $HYPR_SCRIPTS/hypr/brightness-osd.sh up
bind = , XF86MonBrightnessDown, exec, $HYPR_SCRIPTS/hypr/brightness-osd.sh down

# Hardware keys
bind = , XF86Calculator, exec, pkill rofi || rofi -show calc -modi calc -no-show-match -no-sort
bind = , XF86Lock, exec, hyprlock

# Special Features
# Quickshell caps lock indicator
bind = , Caps_Lock, exec, $HYPR_SCRIPTS/hypr/caps-lock-osd.sh
