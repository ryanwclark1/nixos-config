# -----------------------------------------------------
# System Controls & Utilities
# -----------------------------------------------------
# Power management, screenshots, notifications, and system utilities
# -----------------------------------------------------

# Power & System Management
bind = $mainMod SHIFT, Escape, exec, qs-rofi -show system       # System power menu
bind = $mainMod, BackSpace, exec, toggle-transparency           # Toggle window transparency

# System management
bind = $mainMod CTRL, R, exec, hyprctl reload                   # Reload Hyprland configuration
bind = $mainMod CTRL, Escape, exec, hyprlock                    # Lock screen
bind = $mainMod CTRL, I, exec, os-toggle-idle                   # Toggle idle lock
bind = $mainMod CTRL, N, exec, os-toggle-nightlight             # Toggle nightlight

# System info notifications
bind = $mainMod CTRL, T, exec, os-time-show                        # Show current time
bind = $mainMod CTRL, B, exec, os-battery-show                     # Show battery status

# Screenshots
bind = , Print, exec, $WAYLAND_SCRIPTS/screenshot.sh area --freeze                    # Screenshot area selection
bind = $mainMod, S, exec, $WAYLAND_SCRIPTS/screenshot.sh area --freeze              # Screenshot area (saves to file and clipboard)

# OCR Screenshot - capture area and extract text to clipboard
bind = ALT, Print, exec, grimblast --freeze save area - | tesseract - - | wl-copy && notify-send -t 3000 'OCR result copied to buffer'

# Quick Panel Controls (Quickshell)
bind = $mainMod SHIFT, N, exec, quickshell ipc call Shell toggleSurface notifCenter                        # Toggle Notification Center
bind = $mainMod, C, exec, quickshell ipc call Shell toggleSurface controlCenter                                   # Toggle Control Center
bind = $mainMod SHIFT, Comma, exec, quickshell ipc call SettingsHub toggle                           # Toggle Settings Hub
bind = $mainMod, Escape, exec, quickshell ipc call Shell closeAll                                     # Close both panels
bind = $mainMod SHIFT, Escape, exec, quickshell ipc call Shell panicClose                            # Emergency close all overlays

# Plugin bindings (Hyprexpo)
# bind = $mainMod ALT, grave, hyprexpo:expo, toggle

