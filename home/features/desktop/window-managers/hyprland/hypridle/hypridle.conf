# https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/


general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
    ignore_dbus_inhibit = false                 # respect dbus inhibit requests (e.g., from media players).
}

listener {
    timeout = 9000                               # 150min: dim backlight before lock
    on-timeout = brightnessctl -s set 10         # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

# Screenlock
listener {
    # HYPRLOCK TIMEOUT (seconds; align with Quickshell powerAcLockTimeout default)
    timeout = 18000
    # HYPRLOCK ONTIMEOUT
    on-timeout = loginctl lock-session
}

# NOTE: deliberately NO `dpms off` listener. On AMD GPUs, `hyprctl dispatch dpms off`
# makes the monitor drop its DisplayPort link; Hyprland 0.55 reacts to the resulting
# connector-disconnect by entering an unsafe/headless state and crashing in
# getViewsForWorkspace (SIGABRT). The screen stays locked + dimmed (see the 150min
# listener above) until the machine suspends below.
# See: https://github.com/hyprwm/Hyprland/discussions/11356

# Suspend
listener {
    timeout = 36000                     # SUSPEND TIMEOUT (600min / 10h)
    on-timeout = systemctl suspend-then-hibernate                     # suspend pc
}
